<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0693e3"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.15" r="0.6">
      <stop offset="0%" stop-color="#0693e3" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0693e3" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#ffffff"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>

  <g transform="translate(80, 80)">
    <text x="0" y="16" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#9ca3af" letter-spacing="0.15em">VIRTUSLAB · VISDOM</text>
  </g>

  <g transform="translate(80, 230)">
    <text x="0" y="0" font-family="Montserrat, system-ui, sans-serif" font-size="104" font-weight="800" fill="#111827" letter-spacing="-0.02em">Visdom Testing</text>
  </g>

  <text x="80" y="340" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="600" fill="#111827" font-style="italic">
    <tspan x="80" dy="0">When AI writes the code and the tests,</tspan>
    <tspan x="80" dy="48">who tests the tests?</tspan>
  </text>

  <!-- Chips -->
  <g transform="translate(80, 520)" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600">
    <g>
      <rect x="0" y="0" width="140" height="42" rx="21" fill="#eff6ff" stroke="#0693e3" stroke-opacity="0.3"/>
      <text x="70" y="28" fill="#0369a1" text-anchor="middle">ArchUnit</text>
    </g>
    <g transform="translate(160, 0)">
      <rect x="0" y="0" width="190" height="42" rx="21" fill="#faf5ff" stroke="#9b51e0" stroke-opacity="0.3"/>
      <text x="95" y="28" fill="#7c3aed" text-anchor="middle">Property-Based</text>
    </g>
    <g transform="translate(370, 0)">
      <rect x="0" y="0" width="200" height="42" rx="21" fill="#fffbeb" stroke="#f59e0b" stroke-opacity="0.3"/>
      <text x="100" y="28" fill="#b45309" text-anchor="middle">Mutation Testing</text>
    </g>
  </g>
</svg>
